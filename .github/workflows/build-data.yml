name: Rebuild static data

on:
  schedule:
    - cron: '0 6 * * 2'   # Every Tuesday at 6 AM UTC
  workflow_dispatch:        # Manual trigger from the Actions tab any time

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write       # Required to commit and push the updated data files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run build script
        run: node scripts/build-data.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes detected in data files — skipping commit."
          else
            git commit -m "chore: rebuild static data [$(date -u '+%Y-%m-%d')]"
            git push
          fi
