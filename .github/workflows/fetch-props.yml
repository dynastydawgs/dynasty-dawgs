name: Fetch NFL Season-Long Player Props

on:
  schedule:
    # Every Tuesday at 2pm UTC — FD/DK update season lines Tue/Wed
    - cron: '0 14 * * 2'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  fetch-props:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit vegasprops.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: scripts
        run: npm install

      - name: Install Playwright Chromium browser
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Fetch season-long NFL player props (FanDuel + DraftKings)
        working-directory: scripts
        run: node fetch_season_props.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "Dynasty Dawgs"
          git config user.email "dynastydawgs@users.noreply.github.com"
          git add data/vegasprops.json
          if git diff --staged --quiet; then
            echo "No changes to vegasprops.json — skipping commit."
          else
            git commit -m "chore: update NFL season player props ($(date +%Y-%m-%d))"
            git push
          fi
