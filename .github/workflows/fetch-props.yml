name: Fetch NFL Player Props

on:
  schedule:
    # Every Tuesday at 2pm UTC — DK/FD post lines Tue/Wed each week
    - cron: '0 14 * * 2'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  fetch-props:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit vegasprops.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NFL player props
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_props.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "Dynasty Dawgs"
          git config user.email "dynastydawgs@users.noreply.github.com"
          git add data/vegasprops.json
          if git diff --staged --quiet; then
            echo "No changes to vegasprops.json — skipping commit."
          else
            git commit -m "chore: update NFL player props (week $(date +%V))"
            git push
          fi
